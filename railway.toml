[build]
  builder = "nixpacks"

[build.nixpacks]
  nixPkgs = ["nodejs_20", "python3", "make", "gcc", "gcc11"]

[deploy]
  startCommand = "node bot_badak.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 120
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5

[deploy.limits]
  cpu = 1
  memory = 1024

[volumes]
  [volumes.wa-data]
    mountPath = "/app/data"
    size = 1024
