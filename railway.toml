[build]
  builder = "nixpacks"

[build.nixpacks]
  nixPkgs = ["nodejs_20", "python3", "make", "gcc"]

[deploy]
  startCommand = "node bot_badak.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 60
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5

[deploy.limits]
  cpu = 1
  memory = 1024

# ========== VOLUME (PENTING! JANGAN DIHAPUS) ==========
[volumes]
  [volumes.wa-data]
    mountPath = "/app/data"
    size = 1024
