# ============================================================ #
#     W A - K I C K E R   B O T   v 5 . 1 . 0                #
#     R A I L W A Y   C O N F I G   (No Session Reject)      #
# ============================================================ #

[build]
  builder = "nixpacks"

[build.nixpacks]
  # Menggunakan Node.js 20 LTS dengan Python untuk kompilasi native
  nixPkgs = ["nodejs_20", "python3", "make", "gcc", "gcc11"]

[build.nixpacks.phases.install]
  # Clean install tanpa cache untuk menghindari dependency conflict
  cmds = ["npm ci --production=false"]

[build.nixpacks.phases.build]
  # Build step (kalo ada, skip kalo ga ada)
  cmds = ["npm run build || echo 'No build script'"]

[deploy]
  # Railway deployment config
  replicaCount = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5
  startCommand = "node Bot_wa.js"
  
  # Health check configuration (penting!)
  healthcheckPath = "/health"
  healthcheckTimeout = 60
  healthcheckInterval = 30
  
  # Prevent rapid restart
  minReplicas = 1
  maxReplicas = 1

[deploy.limits]
  # Resource limits (sesuaikan dengan kebutuhan)
  cpu = 1
  memory = 1024

[deploy.limits.cpu]
  # Minimal 0.5 core untuk smooth operation
  limit = 1.0
  request = 0.5

[deploy.limits.memory]
  limit = 1024
  request = 512

# ========== VOLUME UNTUK PERSISTENT STORAGE (KRUSIAL!) ==========
[volumes]
  # Volume ini wajib ada! Tempat nyimpen auth session & database
  [volumes.wa-data]
    mountPath = "/app/data"
    size = 1024  # 1 GB cukup untuk ratusan session

# ========== ENVIRONMENT VARIABLES (Default values) ==========
[env]
  # Railway auto-injected
  RAILWAY_ENVIRONMENT = "production"
  RAILWAY_VOLUME_MOUNT_PATH = "/app/data"
  
  # Node config
  NODE_ENV = "production"
  NODE_OPTIONS = "--max-old-space-size=768"
  
  # Port untuk health check
  PORT = "3000"

# ========== NETWORK CONFIG ==========
[network]
  # Bind ke semua interface
  portBindings = ["3000:3000"]

[network.ports]
  [network.ports.health]
    port = 3000
    protocol = "tcp"
